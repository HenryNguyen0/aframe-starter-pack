<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="sand" src="assets/sand.jpg">
        <img id="sky" src="assets/sky.jpg">
        <img id="towel" src="assets/towel.jpg">
        <img id="sprinkles" src="assets/sprinkles.jpg">
        <img id="Sprinkles2" src="assets/Sprinkles2.jpg">
      </a-assets>
      <!-- <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box> -->
      <a-sphere src="#Sprinkles2" position="0 3.5 -3" radius="1.25" scale=".75 .8 .75" color="white"></a-sphere>
      <!-- <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder> -->
      <a-cone position ="0 1.5 -3" scale=".75 2.5 .75" color="orange" rotation="180 0 0"></a-cone>
      <a-plane src="#towel" position="0 0 -4" rotation="-90 0 0" width="4" height="4"></a-plane>
      <a-sky src="#sky"></a-sky>
    </a-scene>
  </body>
</html>
