<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
      <assets>
        <img id="park" src="assets/park.jpg">
        <img id="cow_close" src="assets/cow_close.jpeg">
        <img id="feather" src="assets/feather.jpg">
        <a-assets-item id="cow" src="assets/highland_cow.obj"></a-assets-item>
        <a-assets-item id="birb" src="assets/bird.stl.obj"></a-assets-item>
      </assets>

      <a-obj-model src="#cow" rotation="-90 0 0" scale=".8 .8 .8" position="0 -25 -100"  material="src:#cow_close"></a-obj-model>
      <a-obj-model src="#birb" rotation="-90 0 0" scale=".4 .4 .4" position="25 0 0" material="src:#feather"></a-obj-model>

      <a-light type="ambient" color="white"></a-light>
      <a-light light="color: #ff6000; intensity: 2; type: point"></a-light>
      <a-sky src="#park"></a-sky>
    </a-scene>
  </body>
</html>
